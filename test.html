<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navbar MCBRAIN</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-light: #0f172a;
      --text: #cbd5e1;
      --accent: #8b5cf6;
      --transition: all 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #0f172a;
      color: var(--text);
    }

    header {
      position: relative;
    }

    nav {
      background: var(--bg-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid #334155;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      transition: var(--transition);
    }

    .nav-left,
    .nav-center,
    .nav-right {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .nav-left {
      justify-content: flex-start;
    }

    .nav-center {
      justify-content: center;
      gap: 2rem;
    }

    .nav-right {
      justify-content: flex-end;
      gap: 1rem;
    }

    .nav-logo {
      font-size: 1.6rem;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .nav-links a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      position: relative;
      transition: var(--transition);
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      width: 0%;
      height: 2px;
      left: 0;
      bottom: -5px;
      background-color: var(--accent);
      transition: width 0.4s ease-in-out;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-buttons a {
      padding: 0.5rem 1rem;
      border: 1px solid var(--accent);
      border-radius: 999px;
      color: #ffffff;
      background: transparent;
      font-size: 0.85rem;
      transition: var(--transition);
      box-shadow: 0 0 6px rgba(139, 92, 246, 0.4);
      text-decoration: none;
    }

    .nav-buttons a:hover {
      background-color: var(--accent);
      color: #1e1b4b;
      box-shadow: 0 0 12px rgba(139, 92, 246, 0.8);
    }

    .hamburger {
      display: none;
      width: 30px;
      height: 24px;
      position: relative;
      cursor: pointer;
      z-index: 1100;
    }

    .hamburger span {
      position: absolute;
      width: 100%;
      height: 3px;
      background: var(--text);
      border-radius: 2px;
      transition: 0.4s;
    }

    .hamburger span:nth-child(1) { top: 0; }
    .hamburger span:nth-child(2) { top: 10px; }
    .hamburger span:nth-child(3) { top: 20px; }

    .hamburger.open span:nth-child(1) {
      transform: rotate(45deg);
      top: 10px;
    }

    .hamburger.open span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.open span:nth-child(3) {
      transform: rotate(-45deg);
      top: 10px;
    }

    /* Mobile menu */
    .mobile-menu {
      display: none;
      flex-direction: column;
      align-items: center;
      background: var(--bg-light);
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      padding: 1.5rem 0;
      gap: 1.2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      animation: fadeIn 0.4s ease-in-out;
      z-index: 999;
    }

    .mobile-menu a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      transition: color 0.3s ease;
    }

    .mobile-menu a:hover {
      color: var(--accent);
    }

    .mobile-menu.active {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .nav-center,
      .nav-right {
        display: none;
      }

      .hamburger {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <div class="nav-left">
        <div class="nav-logo">MCBRAIN</div>
      </div>

      <div class="nav-center nav-links">
        <a href="#">Features</a>
        <a href="#">Pricing</a>
        <a href="#">How to Use</a>
        <a href="#">Roadmap</a>
      </div>

      <div class="nav-right nav-buttons">
        <a href="#">New Account</a>
        <a href="#">Sign In</a>
      </div>

      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </nav>
  </header>

  <!-- Menú móvil -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="#">Features</a>
    <a href="#">Pricing</a>
    <a href="#">How to Use</a>
    <a href="#">Roadmap</a>
    <a href="#">New Account</a>
    <a href="#">Sign In</a>
  </div>

  <script>
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');

    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('active');
    });
  </script>
</body>
</html>
